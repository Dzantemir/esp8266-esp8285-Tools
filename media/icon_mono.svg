<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- Chip body -->
  <rect x="5" y="5" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/>
  <!-- Pins left -->
  <line x1="2" y1="8"  x2="5" y2="8"  stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="2" y1="12" x2="5" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="2" y1="16" x2="5" y2="16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Pins right -->
  <line x1="19" y1="8"  x2="22" y2="8"  stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="19" y1="12" x2="22" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="19" y1="16" x2="22" y2="16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Pins top -->
  <line x1="9"  y1="2" x2="9"  y2="5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="15" y1="2" x2="15" y2="5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Pins bottom -->
  <line x1="9"  y1="19" x2="9"  y2="22" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="15" y1="19" x2="15" y2="22" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Inner chip square -->
  <rect x="8" y="8" width="8" height="8" rx="1" fill="currentColor" opacity="0.25"/>
  <!-- Center dot -->
  <circle cx="12" cy="12" r="1.5" fill="currentColor"/>
</svg>
